fragment CompanyFields on Company {
  id
  name
  website
  industry
  location
  notes
  createdAt
  updatedAt
}

fragment CompanyDetailFields on Company {
  ...CompanyFields
  contacts {
    id
    firstName
    lastName
    email
    roleTitle
    status
    relationshipType
  }
}

fragment ContactFields on Contact {
  id
  firstName
  lastName
  preferredName
  roleTitle
  location
  linkedinUrl
  email
  phone
  relationshipType
  status
  source
  notes
  birthdayMonth
  birthdayDay
  birthdayYear
  lastInteractionAt
  nextFollowUpAt
  createdAt
  updatedAt
  company {
    id
    name
    website
    industry
    location
  }
}

fragment InteractionFields on Interaction {
  id
  contactId
  interactionType
  occurredAt
  summary
  outcome
  createdAt
  updatedAt
}

fragment FollowUpFields on FollowUp {
  id
  contactId
  interactionId
  dueAt
  status
  reason
  completedAt
  createdAt
  updatedAt
  contact {
    id
    firstName
    lastName
    email
    roleTitle
    status
    relationshipType
    company {
      id
      name
      website
      industry
      location
    }
  }
}

query Companies {
  companies {
    ...CompanyFields
  }
}

query Company($id: ID!) {
  company(id: $id) {
    ...CompanyDetailFields
  }
}

query Contacts {
  contacts {
    ...ContactFields
  }
}

query Contact($id: ID!) {
  contact(id: $id) {
    ...ContactFields
  }
}

query ContactInteractions($contactId: ID!) {
  contactInteractions(contactId: $contactId) {
    ...InteractionFields
  }
}

query OpenFollowUp($contactId: ID!) {
  openFollowUp(contactId: $contactId) {
    ...FollowUpFields
  }
}

query Dashboard {
  dashboard {
    dueFollowUps {
      ...FollowUpFields
    }
    overdueFollowUps {
      ...FollowUpFields
    }
  }
}

mutation CreateCompany($input: CreateCompanyInput!) {
  createCompany(input: $input) {
    ...CompanyFields
  }
}

mutation CreateContact($input: CreateContactInput!) {
  createContact(input: $input) {
    ...ContactFields
  }
}

mutation CreateInteraction($input: CreateInteractionInput!) {
  createInteraction(input: $input) {
    ...InteractionFields
  }
}

mutation UpdateInteraction($input: UpdateInteractionInput!) {
  updateInteraction(input: $input) {
    ...InteractionFields
  }
}

mutation CreateFollowUp($input: CreateFollowUpInput!) {
  createFollowUp(input: $input) {
    ...FollowUpFields
  }
}

mutation CompleteFollowUp($id: ID!) {
  completeFollowUp(id: $id) {
    ...FollowUpFields
  }
}

mutation CancelFollowUp($id: ID!) {
  cancelFollowUp(id: $id) {
    ...FollowUpFields
  }
}
