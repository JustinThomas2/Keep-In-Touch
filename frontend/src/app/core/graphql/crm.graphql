fragment CompanyFields on Company {
  id
  name
  website
  industry
  location
  notes
  createdAt
  updatedAt
}

fragment CompanyDetailFields on Company {
  ...CompanyFields
  contacts {
    id
    firstName
    lastName
    email
    roleTitle
    status
    relationshipType
  }
}

fragment ContactFields on Contact {
  id
  firstName
  lastName
  preferredName
  roleTitle
  location
  linkedinUrl
  email
  phone
  relationshipType
  status
  source
  notes
  birthdayMonth
  birthdayDay
  birthdayYear
  lastInteractionAt
  nextFollowUpAt
  createdAt
  updatedAt
  company {
    id
    name
    website
    industry
    location
  }
}

fragment InteractionFields on Interaction {
  id
  contactId
  interactionType
  occurredAt
  summary
  outcome
  createdAt
  updatedAt
}

query Companies {
  companies {
    ...CompanyFields
  }
}

query Company($id: ID!) {
  company(id: $id) {
    ...CompanyDetailFields
  }
}

query Contacts {
  contacts {
    ...ContactFields
  }
}

query Contact($id: ID!) {
  contact(id: $id) {
    ...ContactFields
  }
}

query ContactInteractions($contactId: ID!) {
  contactInteractions(contactId: $contactId) {
    ...InteractionFields
  }
}

mutation CreateCompany($input: CreateCompanyInput!) {
  createCompany(input: $input) {
    ...CompanyFields
  }
}

mutation CreateContact($input: CreateContactInput!) {
  createContact(input: $input) {
    ...ContactFields
  }
}

mutation CreateInteraction($input: CreateInteractionInput!) {
  createInteraction(input: $input) {
    ...InteractionFields
  }
}

mutation UpdateInteraction($input: UpdateInteractionInput!) {
  updateInteraction(input: $input) {
    ...InteractionFields
  }
}
